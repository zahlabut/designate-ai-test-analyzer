# ============================================================================
# Designate AI Test Analyzer — configuration
# ============================================================================
# Edit values for your DevStack VM, save, then run:  python3 main.py
#
# Lines starting with # or ; are comments. Values are read from conf.ini only
# (no environment variables required).

[ollama]

# HTTP URL where Ollama listens (Podman container on this host).
# Do not add /v1 — the tool appends that for CrewAI internally.
# Remote Ollama example: http://10.9.95.131:11434
base_url = http://127.0.0.1:11434

# Preferred LLM model. Use the ollama/ prefix, e.g. ollama/llama3.2:1b
# Leave empty to auto-select (one model) or pick from a list (several models).
# Small / recommended on 16 GiB VM: llama3.2:1b  |  Tiny: qwen2.5:0.5b  |  Large (32 GiB+): llama3.1
model =

[tempest]

# Directory to run stestr from (must contain .stestr.conf).
tempest_path = /opt/stack/tempest

# DevStack tempest.conf with OpenStack credentials (actual file location).
devstack_conf = /opt/stack/tempest/etc/tempest.conf

# Default path stestr looks for; tool creates a symlink here if missing.
system_conf = /etc/tempest/tempest.conf

# Config file passed to stestr subprocesses (usually same as devstack_conf).
config = /opt/stack/tempest/etc/tempest.conf

# stestr binary inside the DevStack virtualenv.
stestr_bin = /opt/stack/data/venv/bin/stestr

[paths]

# Per-run artifacts: tempest_run.log, log_evidence.txt, designate_logs/
agent_runs_dir = /opt/stack/agent_runs

[crewai]

# true = verbose CrewAI tracing; false = quiet output (recommended).
tracing_enabled = false

# Placeholder key for the OpenAI-compatible client (Ollama ignores the value).
api_key = ollama
